---
name: CI
on: # yamllint disable-line rule:truthy
  push:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check-changelog-fragment:
    if: >-
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check for changelog fragment
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          FRAGMENT_TYPES="added|changed|fixed|breaking|internal"
          FRAGMENTS=$(git diff --name-only --diff-filter=A \
            "origin/${BASE_REF}...HEAD" \
            -- 'changes/*' \
            | grep -E "\.(${FRAGMENT_TYPES})$" || true)
          if [ -z "$FRAGMENTS" ]; then
            echo "::error::No changelog fragment found. Add a fragment file in" \
              "changes/ (for example, changes/${PR_NUMBER}.added)." \
              "See changes/README.md for details."
            exit 1
          fi

          EMPTY_FRAGMENTS=""
          while IFS= read -r fragment; do
            [ -n "$fragment" ] || continue

            if ! grep -q '[^[:space:]]' "$fragment"; then
              EMPTY_FRAGMENTS="${EMPTY_FRAGMENTS}${fragment}\n"
            fi
          done <<EOF
          $FRAGMENTS
          EOF

          if [ -n "$EMPTY_FRAGMENTS" ]; then
            echo "::error::Empty changelog fragment(s) found. Add a user-facing" \
              "release note to each fragment file:"
            printf '%b' "$EMPTY_FRAGMENTS"
            exit 1
          fi

          echo "Found changelog fragment(s):"
          echo "$FRAGMENTS"
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
      - name: Format with ruff
        run: uv run ruff format --check .
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
      - name: Lint with ruff
        run: uv run ruff check .
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
      - name: Security scan with bandit
        run: uv run bandit -r networkconfparse/
  check-complexity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.13"
      - name: Check code complexity with xenon
        run: uv run xenon --max-absolute B --max-modules B --max-average A networkconfparse/
  check-types:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check type hints with ty
        run: uv run ty check .
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests with pytest
        run: uv run pytest --cov=networkconfparse --cov-report=term-missing
  unit-test-lowest-deps:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
      - name: Install with lowest direct dependency versions
        run: uv sync --group dev --resolution lowest-direct
      - name: Run unit tests with lowest dependency versions
        run: uv run pytest
